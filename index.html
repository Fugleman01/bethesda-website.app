<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-2 border-[#6B1D2F]">

            <a href="index.html" class="text-2xl font-bold text-green-600 flex items-center gap-2">

                <a href="index.html" class="text-green-600 border-b-2 border-green-600 pb-1">Home</a>

                </p>
                <div class="flex justify-center gap-4">

                    <button class="bg-[#6B1D2F] text-white px-6 py-2 rounded shadow hover:bg-opacity-90">Wine Element</button>
